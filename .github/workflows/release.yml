name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: qrctrl
            asset_name: qrctrl-aarch64-macos
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: qrctrl
            asset_name: qrctrl-x86_64-macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: qrctrl
            asset_name: qrctrl-x86_64-linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: qrctrl.exe
            asset_name: qrctrl-x86_64-windows.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxtst-dev libx11-dev libxdo-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build .app bundle (macOS)
        if: runner.os == 'macOS'
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: ./scripts/build-macos-app.sh

      - name: Package macOS assets
        if: runner.os == 'macOS'
        working-directory: target/${{ matrix.target }}/release
        run: |
          cp qrctrl ${{ matrix.asset_name }}
          ditto -c -k --keepParent qrctrl.app ${{ matrix.asset_name }}.app.zip

      - name: Rename binary (non-macOS)
        if: runner.os != 'macOS'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.app.zip
          name: qrctrl ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: true
